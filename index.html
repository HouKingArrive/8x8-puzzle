<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00FFFF">
    <meta name="description" content="結合俄羅斯方塊與消除玩法的策略遊戲">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="8x8 Puzzle">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>8x8 Puzzle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-color: #1A1A1A;
            --board-bg: #2D2D2D;
            --cell-border: #3D3D3D;
            --text-color: #FFFFFF;
            --accent-cyan: #00FFFF;
            --i-color: #00FFFF;
            --j-color: #0000FF;
            --l-color: #FF8800;
            --o-color: #FFFF00;
            --s-color: #00FF00;
            --t-color: #AA00FF;
            --z-color: #FF0000;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(ellipse at top, #2a2a2a 0%, transparent 50%),
                radial-gradient(ellipse at bottom, #1a1a2e 0%, transparent 50%);
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: start;
            width: 100%;
            max-height: 100vh;
            padding: 20px;
        }

        .screen.active {
            display: flex;
        }

        /* Start Screen */
        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            color: var(--accent-cyan);
            text-shadow: 
                0 0 10px var(--accent-cyan),
                0 0 20px var(--accent-cyan),
                0 0 40px var(--accent-cyan);
            margin-bottom: 20px;
            letter-spacing: 4px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px var(--accent-cyan), 0 0 20px var(--accent-cyan); }
            to { text-shadow: 0 0 20px var(--accent-cyan), 0 0 40px var(--accent-cyan), 0 0 60px var(--accent-cyan); }
        }

        .subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 40px;
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 15px 40px;
            border: 2px solid var(--accent-cyan);
            background: transparent;
            color: var(--accent-cyan);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover, .btn:active {
            background: var(--accent-cyan);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--accent-cyan);
        }

        /* Game Screen */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 800px;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            display: none;
        }

        .center-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .right-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            display: none;
        }

        .mobile-header {
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 10px 15px;
            margin-bottom: 8px;
        }

        .mobile-header .game-title {
            order: 1;
        }

        .mobile-header .restart-btn-small {
            order: 2;
        }

        .mobile-header .score-box {
            order: 3;
        }

        .mobile-scores {
            display: flex;
            gap: 30px;
        }

        .mobile-scores .score-box {
            text-align: center;
        }

        @media (min-width: 768px) {
            .mobile-header {
                display: none;
            }
            .game-container {
                flex-direction: row;
                justify-content: space-between;
                align-items: flex-start;
            }

            .left-panel, .right-panel {
                display: flex;
            }

            .center-panel {
                order: 2;
            }

            .left-panel {
                order: 1;
            }

            .right-panel {
                order: 3;
            }
        }

        .header {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            margin-bottom: 8px;
        }

        .score-box {
            text-align: center;
        }

        .score-label {
            font-size: 1.5rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-cyan);
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-cyan);
            text-shadow: 0 0 10px var(--accent-cyan);
        }

        .header-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .restart-btn-small {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            padding: 4px 12px;
            border: 1px solid #555;
            background: transparent;
            color: #888;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .restart-btn-small:hover {
            border-color: #FF5555;
            color: #FF5555;
        }

        #restart-btn-desktop {
            display: none;
        }

        @media (min-width: 768px) {
            #restart-btn {
                display: none;
            }
            #restart-btn-desktop {
                display: block;
            }
        }

        .board-container {
            background: var(--board-bg);
            padding: 8px;
            border-radius: 12px;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
            background: var(--cell-border);
            border-radius: 8px;
            overflow: hidden;
        }

        .cell {
            width: 45px;
            height: 45px;
            background: var(--board-bg);
            transition: all 0.15s ease;
            position: relative;
        }

        .cell.filled {
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .cell.highlight {
            background: rgba(0, 255, 0, 0.3) !important;
            box-shadow: inset 0 0 15px rgba(0, 255, 0, 0.5);
        }

        .cell.invalid {
            background: rgba(255, 0, 0, 0.3) !important;
        }

        .cell.clearing {
            animation: clearCell 300ms ease-out forwards;
        }

        @keyframes clearCell {
            to {
                opacity: 0;
                transform: scale(0.6);
            }
        }

        .cell.flash {
            animation: flashCell 400ms ease-out;
        }

        @keyframes flashCell {
            0% { background: #FFFFFF !important; box-shadow: 0 0 20px #FFFFFF; }
            100% { background: var(--board-bg); }
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            animation: particleFly 600ms ease-out forwards;
        }

        @keyframes particleFly {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0) translateY(-50px); }
        }

        .score-popup {
            position: absolute;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #FFD700;
            text-shadow: 0 0 10px #FFD700, 2px 2px 0 #000;
            pointer-events: none;
            animation: scorePopup 1000ms ease-out forwards;
            z-index: 100;
        }

        @keyframes scorePopup {
            0% { opacity: 0; transform: translateY(20px) scale(0.5); }
            20% { opacity: 1; transform: translateY(0) scale(1.2); }
            40% { transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-30px) scale(0.8); }
        }

        .score-add {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #FFD700;
            transition: all 0.3s ease;
        }

        .score-add.bump {
            animation: scoreBump 300ms ease-out;
        }

        @keyframes scoreBump {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: #FFF; }
            100% { transform: scale(1); }
        }

        .piece-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .piece-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .piece-preview {
            width: 110px;
            height: 110px;
            background: var(--board-bg);
            border-radius: 8px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 2px;
            padding: 10px;
            cursor: grab;
            transition: transform 0.2s ease, opacity 0.3s ease;
            touch-action: none;
        }

        .piece-preview:hover {
            transform: scale(1.05);
        }

        .piece-preview.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .piece-preview.unplaceable {
            animation: shake 0.3s ease;
            background: rgba(255, 0, 0, 0.2);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .preview-cell {
            width: 100%;
            height: 100%;
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .preview-cell.active {
            opacity: 1;
        }

        .rotate-btn {
            margin-top: 8px;
            width: 36px;
            height: 36px;
            border: 2px solid #555;
            background: transparent;
            color: #aaa;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rotate-btn:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            transform: rotate(90deg);
        }

        .rotate-btn:active {
            background: var(--accent-cyan);
            color: var(--bg-color);
        }

        .rotate-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .rotate-btn.disabled:hover {
            transform: none;
            border-color: #555;
            color: #aaa;
        }

        .piece-preview.used {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .controls {
            margin-top: 20px;
        }

        .restart-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            padding: 10px 25px;
            border: 2px solid #555;
            background: transparent;
            color: #888;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .restart-btn:hover {
            border-color: #FF5555;
            color: #FF5555;
        }

        /* Dragging piece */
        .drag-piece {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
            opacity: 0.9;
        }

        .drag-cell {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        /* Game Over Screen */
        .game-over-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 900;
            color: #FF5555;
            text-shadow: 0 0 20px #FF5555;
            margin-bottom: 30px;
        }

        .final-score {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #888;
        }

        .final-score-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-cyan);
            margin-bottom: 30px;
        }

        .new-best {
            color: #FFD700;
            font-size: 1rem;
            margin-bottom: 20px;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Responsive */
        @media (max-width: 767px) {
            .left-panel, .right-panel {
                display: none !important;
            }

            .game-container {
                flex-direction: column;
            }

            .cell {
                width: 40px;
                height: 40px;
            }

            .board-container {
                padding: 5px;
            }

            .piece-preview {
                width: 90px;
                height: 90px;
            }

            .piece-area {
                gap: 12px;
            }

            .header {
                padding: 8px 10px;
            }

            .game-title {
                font-size: 1rem;
            }

            .score-value {
                font-size: 2.2rem;
            }

            .drag-cell {
                width: 28px;
                height: 28px;
            }
        }

        @media (max-width: 400px) {
            .cell {
                width: 36px;
                height: 36px;
            }

            .piece-preview {
                width: 80px;
                height: 80px;
            }

            .drag-cell {
                width: 28px;
                height: 28px;
            }
        }

        /* Color classes */
        .color-I { background: var(--i-color); }
        .color-J { background: var(--j-color); }
        .color-L { background: var(--l-color); }
        .color-O { background: var(--o-color); }
        .color-S { background: var(--s-color); }
        .color-T { background: var(--t-color); }
        .color-Z { background: var(--z-color); }
    </style>
</head>
<body>
    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <h1 class="title">8x8 PUZZLE</h1>
        <p class="subtitle">將方塊放置到棋盤上，消除行列獲得高分！</p>
        <button class="btn" id="start-btn">開始遊戲</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <!-- Mobile Header -->
        <div class="mobile-header">
            <div class="game-title">8x8 PUZZLE</div>
            <button class="restart-btn-small" id="restart-btn">重新開始</button>
            <div class="mobile-scores">
                <div class="score-box">
                    <div class="score-label">分數</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
        </div>

        <div class="game-container">
            <div class="left-panel">
                <div class="score-box">
                    <div class="score-label">分數</div>
                    <div class="score-value" id="score-desktop">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best-score-desktop">0</div>
                </div>
                <button class="restart-btn-small" id="restart-btn-desktop">重新開始</button>
            </div>
            <div class="center-panel">
                <div class="board-container">
                    <div class="board" id="board"></div>
                </div>
                <div class="piece-area" id="piece-area"></div>
            </div>
            <div class="right-panel">
                <div class="game-title">8x8 PUZZLE</div>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="screen">
        <h1 class="game-over-title">GAME OVER</h1>
        <div class="final-score">最終分數</div>
        <div class="final-score-value" id="final-score">0</div>
        <div class="new-best" id="new-best" style="display: none;">🎉 新紀錄！</div>
        <button class="btn" id="replay-btn">再玩一次</button>
    </div>

    <!-- Dragging element -->
    <div class="drag-piece" id="drag-piece" style="display: none;"></div>

    <script>
        const SHAPES = {
            I: { color: '#00FFFF', blocks: [[1,1,1,1]] },
            J: { color: '#0000FF', blocks: [[1,0,0],[1,1,1]] },
            L: { color: '#FF8800', blocks: [[0,0,1],[1,1,1]] },
            O: { color: '#FFFF00', blocks: [[1,1],[1,1]] },
            S: { color: '#00FF00', blocks: [[0,1,1],[1,1,0]] },
            T: { color: '#AA00FF', blocks: [[0,1,0],[1,1,1]] },
            Z: { color: '#FF0000', blocks: [[1,1,0],[0,1,1]] }
        };

        const SHAPE_NAMES = ['I', 'J', 'L', 'O', 'S', 'T', 'Z'];
        const BOARD_SIZE = 8;
        
        let board = [];
        let pieces = [];
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('bestScore')) || 0;
        let isDragging = false;
        let dragPieceIndex = -1;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let lastDragX = 0;
        let lastDragY = 0;

        function initBoard() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(null));
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    boardEl.appendChild(cell);
                }
            }
        }

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function generatePieces() {
            const shuffled = shuffle(SHAPE_NAMES);
            pieces = shuffled.slice(0, 3).map((name, index) => ({
                name,
                rotation: 0,
                color: SHAPES[name].color,
                blocks: JSON.parse(JSON.stringify(SHAPES[name].blocks))
            }));
            renderPieces();
            saveGame();
            checkGameOver();
        }

        function rotatePiece(piece) {
            const blocks = piece.blocks;
            const rows = blocks.length;
            const cols = blocks[0].length;
            
            let rotated;
            
            if (piece.name === 'O') {
                rotated = blocks;
            } else if (piece.name === 'I') {
                if (piece.rotation % 2 === 0) {
                    rotated = [[1, 1, 1, 1]];
                } else {
                    rotated = [[1], [1], [1], [1]];
                }
            } else {
                const newRows = cols;
                const newCols = rows;
                rotated = [];
                for (let c = 0; c < newRows; c++) {
                    rotated[c] = [];
                    for (let r = 0; r < newCols; r++) {
                        rotated[c][r] = blocks[newCols - 1 - r][c];
                    }
                }
            }
            
            piece.blocks = rotated;
            piece.rotation = (piece.rotation + 1) % 4;
        }

        function getPieceBlocks(piece) {
            return piece.blocks;
        }

        function renderPieces() {
            const area = document.getElementById('piece-area');
            area.innerHTML = '';
            
            pieces.forEach((piece, index) => {
                const container = document.createElement('div');
                container.className = 'piece-container';
                
                const preview = document.createElement('div');
                preview.className = 'piece-preview';
                preview.dataset.index = index;
                
                if (piece.used) {
                    preview.classList.add('used');
                }
                
                preview.style.gridTemplateColumns = 'repeat(5, 1fr)';
                preview.style.gridTemplateRows = 'repeat(5, 1fr)';
                
                const blocks = piece.blocks;
                const rows = blocks.length;
                const cols = blocks[0].length;
                const offsetRow = Math.floor((5 - rows) / 2);
                const offsetCol = Math.floor((5 - cols) / 2);
                
                for (let r = 0; r < 5; r++) {
                    for (let c = 0; c < 5; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'preview-cell';
                        const blockRow = r - offsetRow;
                        const blockCol = c - offsetCol;
                        if (blockRow >= 0 && blockRow < rows && blockCol >= 0 && blockCol < cols && blocks[blockRow][blockCol]) {
                            cell.classList.add('active', `color-${piece.name}`);
                            cell.style.background = piece.color;
                        }
                        preview.appendChild(cell);
                    }
                }
                
                if (!piece.used) {
                    preview.addEventListener('mousedown', (e) => startDrag(e, index));
                    preview.addEventListener('touchstart', (e) => startDrag(e, index), { passive: false });
                }
                
                const rotateBtn = document.createElement('button');
                rotateBtn.className = 'rotate-btn';
                rotateBtn.textContent = '↻';
                if (piece.used) {
                    rotateBtn.classList.add('disabled');
                    rotateBtn.disabled = true;
                }
                rotateBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    if (!piece.used) {
                        rotatePiece(pieces[index]);
                        renderPieces();
                        saveGame();
                    }
                });
                rotateBtn.addEventListener('touchend', (e) => {
                    e.stopPropagation();
                    e.preventDefault();
                    if (!piece.used) {
                        rotatePiece(pieces[index]);
                        renderPieces();
                        saveGame();
                    }
                });
                
                container.appendChild(preview);
                container.appendChild(rotateBtn);
                area.appendChild(container);
            });
        }

        function updateBoardUI() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const row = parseInt(cell.dataset.row);
                const col = parseInt(cell.dataset.col);
                cell.className = 'cell';
                if (board[row][col]) {
                    cell.classList.add('filled', `color-${board[row][col]}`);
                    cell.style.background = SHAPES[board[row][col]].color;
                } else {
                    cell.style.background = '';
                }
            });
        }

        function canPlace(piece, row, col) {
            const blocks = piece.blocks;
            const rows = blocks.length;
            const cols = blocks[0].length;
            
            if (row < 0 || col < 0 || row + rows > BOARD_SIZE || col + cols > BOARD_SIZE) return false;
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (blocks[r][c] && board[row + r][col + c]) return false;
                }
            }
            return true;
        }

        function placePiece(piece, row, col) {
            const blocks = piece.blocks;
            for (let r = 0; r < blocks.length; r++) {
                for (let c = 0; c < blocks[0].length; c++) {
                    if (blocks[r][c]) {
                        board[row + r][col + c] = piece.name;
                    }
                }
            }
            score += 4;
            updateScore();
            saveGame();
        }

        function findFullLines() {
            const fullRows = [];
            const fullCols = [];
            
            for (let r = 0; r < BOARD_SIZE; r++) {
                if (board[r].every(cell => cell !== null)) {
                    fullRows.push(r);
                }
            }
            
            for (let c = 0; c < BOARD_SIZE; c++) {
                let full = true;
                for (let r = 0; r < BOARD_SIZE; r++) {
                    if (!board[r][c]) {
                        full = false;
                        break;
                    }
                }
                if (full) fullCols.push(c);
            }
            
            return { rows: fullRows, cols: fullCols };
        }

        function clearLines(rows, cols, callback) {
            const k = rows.length + cols.length;
            if (k === 0) {
                if (callback) callback();
                return 0;
            }
            
            const cellsToClear = new Set();
            rows.forEach(r => {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    cellsToClear.add(`${r},${c}`);
                }
            });
            cols.forEach(c => {
                for (let r = 0; r < BOARD_SIZE; r++) {
                    cellsToClear.add(`${r},${c}`);
                }
            });
            
            let clearScore;
            if (k === 1) clearScore = 30;
            else if (k === 2) clearScore = 75;
            else if (k === 3) clearScore = 150;
            else if (k === 4) clearScore = 300;
            else clearScore = 300 * Math.pow(2, k - 4);
            
            showClearEffects(cellsToClear, clearScore);
            
            const cellElements = document.querySelectorAll('.cell');
            cellsToClear.forEach(key => {
                const [r, c] = key.split(',').map(Number);
                const index = r * BOARD_SIZE + c;
                cellElements[index].classList.add('clearing');
            });
            
            setTimeout(() => {
                cellsToClear.forEach(key => {
                    const [r, c] = key.split(',').map(Number);
                    board[r][c] = null;
                });
                updateBoardUI();
                
                const previousScore = score;
                score += clearScore;
                animateScoreIncrease(previousScore, score);
                
                setTimeout(() => {
                    if (callback) callback();
                }, 300);
            }, 300);
            
            return k;
        }

        function showClearEffects(cellsToClear, points) {
            const boardEl = document.getElementById('board');
            const rect = boardEl.getBoundingClientRect();
            const cellSize = rect.width / BOARD_SIZE;
            
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = `+${points}`;
            popup.style.left = centerX + 'px';
            popup.style.top = centerY + 'px';
            document.body.appendChild(popup);
            
            setTimeout(() => popup.remove(), 1000);
            
            cellsToClear.forEach(key => {
                const [r, c] = key.split(',').map(Number);
                const x = rect.left + c * cellSize + cellSize / 2;
                const y = rect.top + r * cellSize + cellSize / 2;
                
                for (let i = 0; i < 4; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.background = ['#FFD700', '#FF6B6B', '#4ECDC4', '#FF8C42', '#00FFFF'][Math.floor(Math.random() * 5)];
                    particle.style.boxShadow = `0 0 6px ${particle.style.background}`;
                    
                    const angle = (Math.random() * 360) * (Math.PI / 180);
                    const distance = 30 + Math.random() * 40;
                    const tx = Math.cos(angle) * distance;
                    const ty = Math.sin(angle) * distance - 30;
                    
                    particle.style.setProperty('--tx', tx + 'px');
                    particle.style.setProperty('--ty', ty + 'px');
                    particle.animate([
                        { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                        { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                    ], {
                        duration: 400 + Math.random() * 200,
                        easing: 'ease-out'
                    });
                    
                    document.body.appendChild(particle);
                    setTimeout(() => particle.remove(), 600);
                }
            });
        }

        function animateScoreIncrease(from, to) {
            const scoreEl = document.getElementById('score');
            scoreEl.classList.add('bump');
            setTimeout(() => scoreEl.classList.remove('bump'), 300);
            
            scoreEl.textContent = to;
            if (to > bestScore) {
                bestScore = to;
                localStorage.setItem('bestScore', bestScore);
            }
            document.getElementById('best-score').textContent = bestScore;
            saveGame();
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (document.getElementById('score-desktop')) {
                document.getElementById('score-desktop').textContent = score;
            }
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore', bestScore);
            }
            document.getElementById('best-score').textContent = bestScore;
            if (document.getElementById('best-score-desktop')) {
                document.getElementById('best-score-desktop').textContent = bestScore;
            }
        }

        function saveGame() {
            const gameState = {
                board: board,
                pieces: pieces,
                score: score,
                bestScore: bestScore
            };
            localStorage.setItem('gameState', JSON.stringify(gameState));
        }

        function loadGame() {
            const savedState = localStorage.getItem('gameState');
            if (savedState) {
                try {
                    const gameState = JSON.parse(savedState);
                    if (gameState.board && gameState.pieces && gameState.score !== undefined) {
                        board = gameState.board;
                        pieces = gameState.pieces;
                        score = gameState.score;
                        bestScore = gameState.bestScore || bestScore;
                        return true;
                    }
                } catch (e) {
                    console.error('Failed to load game:', e);
                }
            }
            return false;
        }

        function clearSavedGame() {
            localStorage.removeItem('gameState');
        }

        function getBoardCellFromPoint(x, y) {
            const boardEl = document.getElementById('board');
            const rect = boardEl.getBoundingClientRect();
            
            if (x < rect.left || x > rect.right || y < rect.top || y > rect.bottom) {
                return null;
            }
            
            const cellSize = rect.width / BOARD_SIZE;
            const col = Math.floor((x - rect.left) / cellSize);
            const row = Math.floor((y - rect.top) / cellSize);
            
            if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE) {
                return { row, col };
            }
            return null;
        }

        function highlightCells(piece, row, col, valid) {
            clearHighlights();
            
            if (!piece || row === null || col === null) return;
            if (row < 0 || col < 0) return;
            
            const blocks = piece.blocks;
            for (let r = 0; r < blocks.length; r++) {
                for (let c = 0; c < blocks[0].length; c++) {
                    if (blocks[r][c]) {
                        const targetRow = row + r;
                        const targetCol = col + c;
                        if (targetRow >= 0 && targetRow < BOARD_SIZE && targetCol >= 0 && targetCol < BOARD_SIZE) {
                            const cellIndex = targetRow * BOARD_SIZE + targetCol;
                            const cell = document.querySelectorAll('.cell')[cellIndex];
                            if (valid) {
                                cell.classList.add('highlight');
                            } else {
                                cell.classList.add('invalid');
                            }
                        }
                    }
                }
            }
        }

        function clearHighlights() {
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('highlight', 'invalid');
            });
        }

        function startDrag(e, index) {
            e.preventDefault();
            isDragging = true;
            dragPieceIndex = index;
            
            const piece = pieces[index];
            const preview = document.querySelectorAll('.piece-preview')[index];
            preview.classList.add('dragging');
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            dragOffsetX = 0;
            dragOffsetY = 0;
            lastDragX = clientX;
            lastDragY = clientY;
            
            showDragPiece(piece, clientX - 50, clientY - 150);
            
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('touchmove', onDrag, { passive: false });
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);
        }

        function showDragPiece(piece, x, y) {
            const dragEl = document.getElementById('drag-piece');
            dragEl.innerHTML = '';
            dragEl.style.display = 'grid';
            
            const blocks = piece.blocks;
            const rows = blocks.length;
            const cols = blocks[0].length;
            const cellSize = 40;
            
            dragEl.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
            dragEl.style.gridTemplateRows = `repeat(${rows}, ${cellSize}px)`;
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'drag-cell';
                    cell.style.width = cellSize + 'px';
                    cell.style.height = cellSize + 'px';
                    if (blocks[r][c]) {
                        cell.style.background = piece.color;
                    } else {
                        cell.style.opacity = '0';
                    }
                    dragEl.appendChild(cell);
                }
            }
            
            dragEl.style.left = x + 'px';
            dragEl.style.top = y + 'px';
        }

        function onDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const deltaX = clientX - lastDragX;
            const deltaY = clientY - lastDragY;
            
            const dragEl = document.getElementById('drag-piece');
            const currentLeft = parseFloat(dragEl.style.left) || 0;
            const currentTop = parseFloat(dragEl.style.top) || 0;
            
            dragEl.style.left = (currentLeft + deltaX) + 'px';
            dragEl.style.top = (currentTop + deltaY) + 'px';
            
            lastDragX = clientX;
            lastDragY = clientY;
            
            const piece = pieces[dragPieceIndex];
            const blocks = piece.blocks;
            const rows = blocks.length;
            const cols = blocks[0].length;
            
            const cellSize = 15;
            const cell = getBoardCellFromPoint(newX + 15, newY + 15);
            
            if (cell) {
                const targetRow = cell.row;
                const targetCol = cell.col;
                
                if (canPlace(piece, targetRow, targetCol)) {
                    highlightCells(piece, targetRow, targetCol, true);
                } else {
                    highlightCells(piece, targetRow, targetCol, false);
                }
            } else {
                clearHighlights();
            }
        }

        function endDrag(e) {
            if (!isDragging) return;
            
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('touchmove', onDrag);
            document.removeEventListener('mouseup', endDrag);
            document.removeEventListener('touchend', endDrag);
            
            const dragEl = document.getElementById('drag-piece');
            const dropX = parseFloat(dragEl.style.left);
            const dropY = parseFloat(dragEl.style.top);
            
            const piece = pieces[dragPieceIndex];
            const blocks = piece.blocks;
            const rows = blocks.length;
            const cols = blocks[0].length;
            
            const cell = getBoardCellFromPoint(dropX + 15, dropY + 15);
            
            let placed = false;
            if (cell) {
                const targetRow = cell.row;
                const targetCol = cell.col;
                
                if (canPlace(piece, targetRow, targetCol)) {
                    placePiece(piece, targetRow, targetCol);
                    piece.used = true;
                    placed = true;
                }
            }
            
            const preview = document.querySelectorAll('.piece-preview')[dragPieceIndex];
            preview.classList.remove('dragging');
            
            document.getElementById('drag-piece').style.display = 'none';
            clearHighlights();
            
            if (placed) {
                renderPieces();
                updateBoardUI();
                
                const { rows: fullRows, cols: fullCols } = findFullLines();
                clearLines(fullRows, fullCols, () => {
                    const allUsed = pieces.every(p => p.used);
                    if (allUsed) {
                        generatePieces();
                    } else {
                        checkGameOver();
                    }
                });
            } else {
                preview.classList.add('unplaceable');
                setTimeout(() => {
                    preview.classList.remove('unplaceable');
                }, 300);
            }
            
            isDragging = false;
            dragPieceIndex = -1;
        }

        function canPlaceAnyRotation(piece) {
            const testPiece = { ...piece, blocks: JSON.parse(JSON.stringify(piece.blocks)) };
            
            for (let rot = 0; rot < 4; rot++) {
                if (rot > 0) rotatePiece(testPiece);
                
                for (let row = 0; row <= BOARD_SIZE - testPiece.blocks.length; row++) {
                    for (let col = 0; col <= BOARD_SIZE - testPiece.blocks[0].length; col++) {
                        if (canPlace(testPiece, row, col)) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function checkGameOver() {
            const availablePieces = pieces.filter(p => !p.used);
            for (const piece of availablePieces) {
                if (canPlaceAnyRotation(piece)) {
                    return false;
                }
            }
            
            if (availablePieces.length > 0) {
                gameOver();
                return true;
            }
            return false;
        }

        function gameOver() {
            document.getElementById('final-score').textContent = score;
            document.getElementById('gameover-screen').classList.add('active');
            document.getElementById('game-screen').classList.remove('active');
            
            if (score >= bestScore && score > 0) {
                document.getElementById('new-best').style.display = 'block';
            } else {
                document.getElementById('new-best').style.display = 'none';
            }
        }

        function startGame() {
            const loaded = loadGame();
            if (loaded) {
                const boardEl = document.getElementById('board');
                boardEl.innerHTML = '';
                for (let row = 0; row < BOARD_SIZE; row++) {
                    for (let col = 0; col < BOARD_SIZE; col++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = row;
                        cell.dataset.col = col;
                        boardEl.appendChild(cell);
                    }
                }
                updateBoardUI();
                renderPieces();
                updateScore();
            } else {
                score = 0;
                initBoard();
                generatePieces();
                updateScore();
            }
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('gameover-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
        }

        function restartGame() {
            clearSavedGame();
            score = 0;
            updateScore();
            initBoard();
            generatePieces();
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('gameover-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
        }

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', restartGame);
        document.getElementById('restart-btn-desktop').addEventListener('click', restartGame);
        document.getElementById('replay-btn').addEventListener('click', restartGame);

        document.getElementById('best-score').textContent = bestScore;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((registration) => {
                        console.log('SW registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
